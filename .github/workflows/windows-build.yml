name: Compilar e Publicar Tauri para Windows

# Isso diz ao GitHub para rodar a receita sempre que você salvar (push) 
# na branch 'main', ou quando você clicar no botão de rodar manualmente.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest # Aqui o GitHub liga o PC Windows virtual

    steps:
    - name: Baixar o código
      uses: actions/checkout@v4

    - name: Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Instalar Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Instalar Dependências do Projeto
      run: npm install

    - name: Gerar versão incremental do app
      shell: pwsh
      run: |
        $version = "0.1.${{ github.run_number }}"

        $package = Get-Content package.json -Raw | ConvertFrom-Json
        $package.version = $version
        $package | ConvertTo-Json -Depth 100 | Set-Content package.json

        $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
        $tauri.version = $version
        $tauri | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json

        "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Compilar o App e Gerar o .exe
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      with:
        tagName: app-v${{ env.APP_VERSION }}
        releaseName: 'Despertador v${{ env.APP_VERSION }}'
        releaseDraft: false
        prerelease: false