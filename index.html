<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Despertador</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #282c34;
      color: white;
      margin: 0;
    }

    .alarm-container {
      background: #333;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
    }

    input[type="time"] {
      padding: 10px;
      font-size: 2rem;
      margin: 20px 0;
      border-radius: 5px;
      border: none;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
    }

    button {
      padding: 12px 20px;
      font-size: 1.1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #61dafb;
      color: #282c34;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
      transition: background 0.2s;
    }

    button:hover { background-color: #21a1c4; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: #1a1a2e;
      padding: 22px 20px;
      border-radius: 12px;
      text-align: center;
      width: 95%;
      max-width: 460px;
      max-height: 94vh;
      overflow-y: auto;
      box-shadow: 0 0 30px rgba(97,218,251,0.25);
      border: 1px solid #2a2a45;
    }

    .modal-content h2 {
      font-size: 1.9rem;
      margin: 0 0 14px 0;
      color: #ff4d4d;
      letter-spacing: 2px;
    }

    /* Challenge select */
    .challenge-desc {
      color: #999;
      margin: 0 0 14px 0;
      font-size: 0.92rem;
    }

    .btn-easy  { background: #27ae60 !important; color: #fff !important; }
    .btn-easy:hover  { background: #1e8449 !important; }
    .btn-hard  { background: #e67e22 !important; color: #fff !important; }
    .btn-hard:hover  { background: #ca6f1e !important; }
    .btn-stop  { background: #e74c3c !important; color: #fff !important; }
    .btn-stop:hover  { background: #c0392b !important; }
    .btn-back  {
      background: #3a3a5c !important;
      color: #bbb !important;
      width: auto !important;
      font-size: 0.8rem !important;
      padding: 6px 12px !important;
      margin-top: 14px;
    }
    .btn-back:hover { background: #4a4a6c !important; }

    /* Tetris game area */
    .tetris-wrap {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: flex-start;
      margin: 8px 0;
    }

    #tetris-board {
      border: 2px solid #3a3a5c;
      border-radius: 3px;
      display: block;
    }

    .tetris-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-width: 88px;
    }

    .side-label {
      font-size: 0.76rem;
      color: #777;
      margin: 0;
    }

    #tetris-next-canvas {
      border: 1px solid #3a3a5c;
      border-radius: 3px;
    }

    .progress-outer {
      width: 82px;
      height: 10px;
      background: #2a2a45;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 10px;
    }

    #tetris-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #61dafb, #00b4d8);
      border-radius: 5px;
      transition: width 0.3s ease;
    }

    #tetris-progress-text {
      font-size: 0.8rem;
      color: #888;
      margin: 3px 0 0 0;
    }

    #tetris-goal-text {
      color: #61dafb;
      font-weight: bold;
      font-size: 0.92rem;
      margin: 0 0 8px 0;
    }

    .tetris-controls {
      font-size: 0.7rem;
      color: #555;
      margin: 6px 0 0 0;
    }

    /* Win screen */
    .win-trophy { font-size: 3rem; margin: 10px 0 4px 0; }
    .win-text   { font-size: 1.15rem; color: #61dafb; margin: 4px 0 18px 0; }
  </style>
</head>
<body>

  <div class="alarm-container">
    <h1>Despertador</h1>
    <h2 id="current-time">00:00:00</h2>
    <label for="alarm-time">Defina o horário:</label>
    <input type="time" id="alarm-time">
    <button onclick="setAlarm()">Ativar Alarme</button>
    <p id="alarm-status">Nenhum alarme definido.</p>
  </div>

  <div class="modal-overlay" id="alarm-modal">
    <div class="modal-content">
      <h2>⏰ ACORDA!</h2>

      <!-- Tela 1: Escolha do desafio -->
      <div id="screen-choose">
        <p class="challenge-desc">Vença o Tetris para controlar o alarme:</p>
        <button class="btn-easy" onclick="startChallenge('easy')">
          🟢 Jogar para ENCERRAR<br>
          <small style="font-weight:normal;font-size:.82rem">Limpe 3 linhas — velocidade normal</small>
        </button>
        <button class="btn-hard" onclick="startChallenge('hard')">
          🔴 Jogar para SONECA (5 min)<br>
          <small style="font-weight:normal;font-size:.82rem">Limpe 8 linhas — rápido + lixo no tabuleiro</small>
        </button>
      </div>

      <!-- Tela 2: Jogo Tetris -->
      <div id="screen-game" style="display:none">
        <p id="tetris-goal-text"></p>
        <div class="tetris-wrap">
          <canvas id="tetris-board" width="240" height="480"></canvas>
          <div class="tetris-side">
            <p class="side-label">Próxima:</p>
            <canvas id="tetris-next-canvas" width="80" height="80"></canvas>
            <p class="side-label" style="margin-top:10px">Progresso:</p>
            <div class="progress-outer">
              <div id="tetris-progress-bar"></div>
            </div>
            <p id="tetris-progress-text">0 / 3</p>
            <button class="btn-back" onclick="backToChoose()">← Voltar</button>
          </div>
        </div>
        <p class="tetris-controls">← → mover &nbsp;|&nbsp; ↑ girar &nbsp;|&nbsp; ↓ descer &nbsp;|&nbsp; Espaço: drop</p>
      </div>

      <!-- Tela 3: Vitória -->
      <div id="screen-win" style="display:none">
        <p class="win-trophy">🏆</p>
        <p class="win-text">Desafio vencido!</p>
        <button id="btn-confirm-stop"   class="btn-stop" style="display:none" onclick="stopAlarm()">Encerrar Alarme</button>
        <button id="btn-confirm-snooze"                  style="display:none" onclick="snooze()">Soneca (5 min)</button>
      </div>
    </div>
  </div>

  <script>
    // ===================== ALARME =====================
    let alarmTime = null;
    let alarmInterval = null;
    const alarmSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    alarmSound.loop = true;

    setInterval(() => {
      document.getElementById('current-time').innerText =
        new Date().toLocaleTimeString('pt-BR');
    }, 1000);

      // Abre o desafio imediatamente ao carregar
      window.addEventListener('DOMContentLoaded', () => triggerAlarm());

    function setAlarm() {
      const inputTime = document.getElementById('alarm-time').value;
      if (!inputTime) { alert('Por favor, selecione um horário!'); return; }
      const now = new Date();
      const [h, m] = inputTime.split(':');
      alarmTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), +h, +m, 0);
      if (alarmTime < now) alarmTime.setDate(alarmTime.getDate() + 1);
      document.getElementById('alarm-status').innerText = `Alarme definido para as ${inputTime}.`;
      if (alarmInterval) clearInterval(alarmInterval);
      alarmInterval = setInterval(checkAlarm, 1000);
    }

    function checkAlarm() {
      if (alarmTime && new Date() >= alarmTime) triggerAlarm();
    }

    function triggerAlarm() {
      clearInterval(alarmInterval);
      alarmTime = null;
      document.getElementById('alarm-status').innerText = 'Alarme tocando!';
      alarmSound.play().catch(() => {});
      showScreen('choose');
      document.getElementById('alarm-modal').style.display = 'flex';
    }

    function stopAlarm() {
      alarmSound.pause();
      alarmSound.currentTime = 0;
      stopTetris();
      document.getElementById('alarm-modal').style.display = 'none';
      document.getElementById('alarm-status').innerText = 'Alarme encerrado.';
    }

    function snooze() {
      stopAlarm();
      alarmTime = new Date(Date.now() + 5 * 60000);
      const t = alarmTime.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('alarm-status').innerText = `Soneca ativada. Retornará às ${t}.`;
      alarmInterval = setInterval(checkAlarm, 1000);
    }

    // ===================== TETRIS =====================
    const BW = 10, BH = 20, BS = 24; // board width, height, block size (pixels)
    const EASY_GOAL = 3,  HARD_GOAL = 8;
    const EASY_SPEED = 700, HARD_SPEED = 290;

    const COLORS = {
      I:'#00f0f0', O:'#f0f000', T:'#b000f0',
      S:'#00e000', Z:'#f03030', J:'#3030f0', L:'#f0a000'
    };
    const SHAPES = {
      I:[[1,1,1,1]],
      O:[[1,1],[1,1]],
      T:[[0,1,0],[1,1,1]],
      S:[[0,1,1],[1,1,0]],
      Z:[[1,1,0],[0,1,1]],
      J:[[1,0,0],[1,1,1]],
      L:[[0,0,1],[1,1,1]]
    };

    let board, piece, nextPiece, px, py;
    let tickTimer = null, running = false;
    let linesCleared = 0, mode = null;

    function randPiece() {
      const keys = Object.keys(SHAPES);
      const k = keys[Math.floor(Math.random() * keys.length)];
      return { type: k, shape: SHAPES[k].map(r => [...r]) };
    }

    function rotate(shape) {
      return shape[0].map((_, c) => shape.map(row => row[c]).reverse());
    }

    function collides(b, shape, x, y) {
      for (let r = 0; r < shape.length; r++)
        for (let c = 0; c < shape[r].length; c++)
          if (shape[r][c]) {
            const nr = y + r, nc = x + c;
            if (nr >= BH || nc < 0 || nc >= BW) return true;
            if (nr >= 0 && b[nr][nc]) return true;
          }
      return false;
    }

    function initBoard(garbage) {
      board = Array.from({ length: BH }, () => Array(BW).fill(0));
      const gc = Object.keys(SHAPES);
      for (let i = 0; i < garbage; i++) {
        const row = Array.from({ length: BW }, () =>
          Math.random() < 0.75 ? gc[Math.floor(Math.random() * gc.length)] : 0
        );
        row[Math.floor(Math.random() * BW)] = 0; // garante ao menos um buraco
        board[BH - 1 - i] = row;
      }
    }

    function spawn() {
      piece = nextPiece;
      nextPiece = randPiece();
      px = Math.floor((BW - piece.shape[0].length) / 2);
      py = 0;
      if (collides(board, piece.shape, px, py)) {
        // Game over: reinicia o tabuleiro mas mantém o progresso
        initBoard(mode === 'hard' ? 4 : 0);
        spawn();
        return;
      }
      drawNext();
    }

    function lockAndClear() {
      piece.shape.forEach((row, r) =>
        row.forEach((v, c) => { if (v) board[py + r][px + c] = piece.type; })
      );
      let cleared = 0;
      for (let r = BH - 1; r >= 0; r--) {
        if (board[r].every(v => v)) {
          board.splice(r, 1);
          board.unshift(Array(BW).fill(0));
          cleared++;
          r++;
        }
      }
      if (cleared) {
        linesCleared += cleared;
        updateProgress();
        if (checkGoal()) return;
      }
      spawn();
      drawBoard();
    }

    function tick() {
      if (!running) return;
      if (collides(board, piece.shape, px, py + 1)) {
        lockAndClear();
      } else {
        py++;
        drawBoard();
      }
    }

    function startChallenge(m) {
      mode = m;
      linesCleared = 0;
      initBoard(m === 'hard' ? 4 : 0);
      nextPiece = randPiece();
      spawn();
      updateProgress();

      document.getElementById('tetris-goal-text').textContent =
        m === 'hard'
          ? `🔴 Meta: ${HARD_GOAL} linhas → Soneca`
          : `🟢 Meta: ${EASY_GOAL} linhas → Encerrar`;

      showScreen('game');
      running = true;
      if (tickTimer) clearInterval(tickTimer);
      tickTimer = setInterval(tick, m === 'hard' ? HARD_SPEED : EASY_SPEED);
      document.addEventListener('keydown', onKey);
      setupTouch();
      drawBoard();
    }

    function backToChoose() {
      stopTetris();
      showScreen('choose');
    }

    function stopTetris() {
      running = false;
      if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
      document.removeEventListener('keydown', onKey);
    }

    function onKey(e) {
      if (!running) return;
      switch (e.key) {
        case 'ArrowLeft':
          if (!collides(board, piece.shape, px - 1, py)) { px--; drawBoard(); }
          e.preventDefault(); break;
        case 'ArrowRight':
          if (!collides(board, piece.shape, px + 1, py)) { px++; drawBoard(); }
          e.preventDefault(); break;
        case 'ArrowDown':
          tick(); e.preventDefault(); break;
        case 'ArrowUp': case 'z': case 'Z': {
          const r = rotate(piece.shape);
          if (!collides(board, r, px, py)) { piece.shape = r; drawBoard(); }
          e.preventDefault(); break;
        }
        case ' ': {
          while (!collides(board, piece.shape, px, py + 1)) py++;
          lockAndClear();
          e.preventDefault(); break;
        }
      }
    }

    // Controles touch
    let tx0 = 0, ty0 = 0;
    function setupTouch() {
      const cv = document.getElementById('tetris-board');
      cv.addEventListener('touchstart', e => {
        tx0 = e.touches[0].clientX;
        ty0 = e.touches[0].clientY;
      }, { passive: true });
      cv.addEventListener('touchend', e => {
        if (!running) return;
        const dx = e.changedTouches[0].clientX - tx0;
        const dy = e.changedTouches[0].clientY - ty0;
        if (Math.abs(dx) < 12 && Math.abs(dy) < 12) {
          const r = rotate(piece.shape);
          if (!collides(board, r, px, py)) { piece.shape = r; drawBoard(); }
        } else if (Math.abs(dx) > Math.abs(dy)) {
          const steps = Math.round(dx / BS);
          for (let i = 0; i < Math.abs(steps); i++) {
            const d = steps > 0 ? 1 : -1;
            if (collides(board, piece.shape, px + d, py)) break;
            px += d;
          }
          drawBoard();
        } else if (dy > 30) {
          while (!collides(board, piece.shape, px, py + 1)) py++;
          lockAndClear();
        }
      }, { passive: true });
    }

    function updateProgress() {
      const goal = mode === 'hard' ? HARD_GOAL : EASY_GOAL;
      const n = Math.min(linesCleared, goal);
      document.getElementById('tetris-progress-bar').style.width = (n / goal * 100) + '%';
      document.getElementById('tetris-progress-text').textContent = `${n} / ${goal}`;
    }

    function checkGoal() {
      const goal = mode === 'hard' ? HARD_GOAL : EASY_GOAL;
      if (linesCleared < goal) return false;
      stopTetris();
      document.getElementById('btn-confirm-stop').style.display   = mode === 'easy' ? 'block' : 'none';
      document.getElementById('btn-confirm-snooze').style.display = mode === 'hard' ? 'block' : 'none';
      showScreen('win');
      return true;
    }

    // ---------------------- Desenho ----------------------
    function drawBoard() {
      const ctx = document.getElementById('tetris-board').getContext('2d');

      // fundo
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, BW * BS, BH * BS);

      // grade
      ctx.strokeStyle = '#1a1f2e';
      ctx.lineWidth = 0.5;
      for (let r = 0; r < BH; r++)
        for (let c = 0; c < BW; c++)
          ctx.strokeRect(c * BS, r * BS, BS, BS);

      // peças travadas
      for (let r = 0; r < BH; r++)
        for (let c = 0; c < BW; c++)
          if (board[r][c]) drawBlock(ctx, c, r, COLORS[board[r][c]]);

      // ghost
      let gy = py;
      while (!collides(board, piece.shape, px, gy + 1)) gy++;
      if (gy > py) {
        ctx.globalAlpha = 0.18;
        piece.shape.forEach((row, r) =>
          row.forEach((v, c) => {
            if (v) { ctx.fillStyle = COLORS[piece.type]; ctx.fillRect((px+c)*BS+1,(gy+r)*BS+1,BS-2,BS-2); }
          })
        );
        ctx.globalAlpha = 1;
      }

      // peça ativa
      piece.shape.forEach((row, r) =>
        row.forEach((v, c) => { if (v) drawBlock(ctx, px + c, py + r, COLORS[piece.type]); })
      );
    }

    function drawBlock(ctx, x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x*BS+1, y*BS+1, BS-2, BS-2);
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fillRect(x*BS+1, y*BS+1, BS-2, 4);
      ctx.fillRect(x*BS+1, y*BS+1, 4, BS-2);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(x*BS+1, y*BS+BS-4, BS-2, 3);
    }

    function drawNext() {
      const ctx = document.getElementById('tetris-next-canvas').getContext('2d');
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, 80, 80);
      const s = nextPiece.shape, nb = 18;
      const ox = Math.floor((4 - s[0].length) / 2);
      const oy = Math.floor((4 - s.length) / 2);
      ctx.fillStyle = COLORS[nextPiece.type];
      s.forEach((row, r) =>
        row.forEach((v, c) => {
          if (v) ctx.fillRect((ox+c)*nb+2, (oy+r)*nb+2, nb-2, nb-2);
        })
      );
    }

    // ---------------------- Telas ----------------------
    function showScreen(name) {
      document.getElementById('screen-choose').style.display = name === 'choose' ? 'block' : 'none';
      document.getElementById('screen-game').style.display   = name === 'game'   ? 'block' : 'none';
      document.getElementById('screen-win').style.display    = name === 'win'    ? 'block' : 'none';
    }
  </script>
</body>
</html>
